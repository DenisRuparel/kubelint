apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-config
  namespace: production
  labels:
    app: my-app
    environment: production
    managed-by: kubelint
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  API_TIMEOUT: "30"
  FEATURE_FLAG_CACHE: "true"
  MAX_CONNECTIONS: "100"

  # Example application config
  DATABASE_HOST: "postgres-service"
  REDIS_HOST: "redis-service"
  SERVICE_PORT: "3000"
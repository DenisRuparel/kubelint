appName: sample-app
namespace: production
environment: production

replicas: 3

image:
  repository: nginx
  tag: "1.25"

service:
  name: sample-service
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

configMap:
  name: sample-config
  logLevel: info

secret:
  name: sample-secret
  dbUsername: produser
  dbPassword: strongpassword123

ingress:
  name: sample-ingress
  host: sample-app.com
